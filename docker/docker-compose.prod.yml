version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: innerqa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ww232315.
      MYSQL_DATABASE: innerQaSystem
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - innerqa

  redis:
    image: redis:7-alpine
    container_name: innerqa-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - innerqa

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: innerqa-etcd
    restart: unless-stopped
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - innerqa

  minio:
    image: minio/minio:latest
    container_name: innerqa-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - innerqa

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: innerqa-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - innerqa

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: innerqa-backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      PYTHONUNBUFFERED: 1
    env_file:
      - ../backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - innerqa

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: innerqa-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - innerqa

volumes:
  mysql_data:

networks:
  innerqa:
    driver: bridge
